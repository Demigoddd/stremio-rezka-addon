name: Sync to Hugging Face Hub

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        lfs: true

    - name: Push to HF
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: git push --force https://Demigoddd:$HF_TOKEN@huggingface.co/spaces/Demigoddd/stremio-rezka-addon main
